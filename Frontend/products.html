<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <div id="navbar-placeholder"></div>
    <main style="display: flex;flex-direction: column; text-align: center;">
        <h1 style="padding-top: 20px;">Productos</h1>
        <p id="page-indicator">Pagina: 1</p>
        <div class="products-grid">
            <template id="product-card-template">
                <div class="product-card">
                    <img src="" alt="">
                    <h3></h3>
                    <p></p>
                </div>
            </template>
        </div>
        <div class="pagination-controls">
            <button id="prev-page">&lt;</button>
            <button id="next-page">&gt;</button>

            <div style="display: flex; flex-direction: column; ">
                <label for="order-select">Ordenar por:</label>
                <select id="order-select">
                    <option value="ASC">Ascendente</option>
                    <option value="DESC">Descendente</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column; ">
                <label for="order-select">Mostrar:</label>
                <select id="limit-select">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                </select>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="js/script.js"></script>
    <script type="module" src="js/products.js"></script>
    <script type="module" src="js/shoppingCartFab.js"></script>
    </script>
</body>

</html>
